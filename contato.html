<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Contato Pedro</title>
        <link rel="stylesheet" type="text/css" href="css/reset.css">
        <link rel="stylesheet" type="text/css" href="css/navigation.css">
        <link rel="stylesheet" type="text/css" href="css/footer.css">
        <link rel="stylesheet" type="text/css" href="css/contato.css">

    </head>
    <body>
        <header>
            <div class="caixa">
                <h1><img  class="logo" src="img/logo.png" alt="Logo da Barbearia Alura"></h1>
                <nav>
                  <ul>
                    <li><a href="C:\Users\Pedro\Downloads\HTML e CSS\HTML e CSS 1\index.html">Home</a></li>
                    <li><a href="produtos.html">Produtos</a></li>
                    <li><a href="contato.html">Contato</a></li>
                  </ul>
                </nav>
              </div>
        </header>

        <main>
            <form class="formulario">
                <label for="nomesobrenome">Nome e Sobrenome:</label>
                <input class="input-padrao" type="text" name="nomesobrenome" id="nomesobrenome" placeholder="Ex: Joao da Nica" required>

                <label  for="email">Email:</label>
                <input class="input-padrao" type="email" name="email" id="email" placeholder="email@dominio.com" required>

                <label  for="telefone">Telefone:</label>
                <input class="input-padrao" type="tel" name="telefone" id="telefone" placeholder="Ex: (xx) xxxxx-xxxx" required>

                <label  for="mensagem">Mensagem: </label>
                <textarea class="input-padrao" name="mensagem" id="mensagem" cols="72" rows="8" required></textarea>

                <fieldset>
                    <legend>Como prefere o nosso contato? </legend>
                    <label for="radio-email"><input type="radio" value="Email" name="contato" id="radio-email"> Email</label>
                    

                    <label for="radio-ligacao"><input type="radio" value="telefone" name="contato" id="radio-ligacao"> Ligação</label>
                    
                    <label for="radio-whatsapp" checked><input type="radio" value="telefone" name="contato" id="radio-whatsapp"> Whatsapp</label>
                  
                </fieldset>
                <fieldset>
                    <legend>Qual Horario prefere para o Atendimento?</legend>
                    <select>
                        <option value="select">Manhã</option>
                        <option value="select">Tarde</option>
                        <option value="select">Noite</option>
                    </select>
                </fieldset>
                
                
                <label class="checkbox"><input type="checkbox" checked> Gostaria de receber nossas novidades por email?</label>

                <input class="enviar" type="submit" name="enviar" value="Enviar Formulario">

            </form>
            <table>
                <thead>
                    <tr >
                        <th>Dia</th>
                        <th>Horário</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Segunda</td>
                        <td>8h - 20h</td>
                    </tr>
                    <tr>
                        <td>Quarta</td>
                        <td>8h - 20h</td>
                    </tr>
                    <tr>
                        <td>Sexta</td>
                        <td>8h - 20h</td>
                    </tr>
                </tbody>
                
            </table>
        </main>

        <footer>
            <img src="img/logo-branco.png" alt="Logo da Barbearia Alura">
            <p class="copyright">&copy; Copyright Barbearia Pedro 2019</p>
        </footer>
    </body>
</html>
